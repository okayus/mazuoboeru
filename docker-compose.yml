# Drives Anthropic's published devcontainer image (.docker/Dockerfile) without
# VS Code. Bring up with `docker compose up -d`, then `docker compose exec dev zsh`.
#
# Project: mazuoboeru (まず覚える). Adjust the published port to your dev server.
services:
  dev:
    build:
      context: .docker
      dockerfile: Dockerfile
      args:
        TZ: Asia/Tokyo
        CLAUDE_CODE_VERSION: latest
        # Opt-in language toolchains. Enable only what this project uses — leaving
        # both false reproduces the original Node/TS-only image.
        INSTALL_RUST: "false"
        INSTALL_HASKELL: "false"
        # Bakes Playwright Chromium + its OS libs at build time so `pnpm e2e`
        # (apps/web/e2e) runs fully in-container — no runtime egress (browser → local
        # 127.0.0.1 Worker only). Adds ~0.4 GB to the image. After changing this or the
        # pinned PLAYWRIGHT_VERSION, rebuild: docker compose down && build && up -d.
        INSTALL_PLAYWRIGHT: "true"
    container_name: mazuoboeru-dev
    # Required so init-firewall.sh can program iptables/ipset.
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # Non-root so `--dangerously-skip-permissions` is usable; the firewall is the boundary.
    user: node
    working_dir: /workspace
    volumes:
      # Project bind mount: edit on the host, runs in the container.
      - ./:/workspace:delegated
      # Named volumes: Claude auth + shell history survive `docker compose down`.
      - claude-config:/home/node/.claude
      - bash-history:/commandhistory
    environment:
      NODE_OPTIONS: "--max-old-space-size=4096"
      CLAUDE_CONFIG_DIR: "/home/node/.claude"
      # 2026-06-12: CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC (umbrella for the three
      # flags below + DISABLE_TELEMETRY) was split so that ONLY Statsig is re-enabled
      # (DISABLE_TELEMETRY unset). Empirically this alone makes the /model picker list
      # flag-gated models (Fable 5) — gates arrive via api.anthropic.com. Statsig
      # endpoints are OPTIONAL firewall domains (init-firewall.sh) so telemetry uploads
      # also succeed. Sentry stays blocked; updates stay npm-at-start (command).
      DISABLE_AUTOUPDATER: "1"
      DISABLE_FEEDBACK_COMMAND: "1"
      DISABLE_ERROR_REPORTING: "1"
      # Default model (kept even now that the picker lists Fable).
      ANTHROPIC_MODEL: "claude-fable-5"
      POWERLEVEL9K_DISABLE_GITSTATUS: "true"
      TZ: Asia/Tokyo
    ports:
      # host:container — host 5373 avoids collision with other local dev servers
      # (5173 = generic Vite, 5273 = kokemusu). Inside the container Vite listens on
      # 5173; reach it at http://localhost:5373.
      - "5373:5173" # Vite dev server (run with --host 0.0.0.0 in-container)
    init: true
    tty: true
    stdin_open: true
    # On every start: program the firewall, refresh global CLIs, enforce container-side
    # Claude defaults, keep the container alive.
    # - claude updates via npm (registry.npmjs.org is allowlisted) because the native
    #   auto-updater's download host (downloads.claude.ai) is outside the egress allowlist.
    # - pnpm lives in the container layer and vanishes on recreation, so reinstall it too.
    # - defaultMode=bypassPermissions is written into the CONTAINER-scope user settings
    #   (named volume), NOT the repo-shared .claude/settings.json — host sessions keep
    #   normal prompting. Safe here because the firewall is the boundary and deny rules
    #   (git push) still apply in bypass mode.
    # - No step may kill the container on failure (fall back to image-baked versions).
    command: >
      sh -c "sudo /usr/local/bin/init-firewall.sh &&
             (npm i -g @anthropic-ai/claude-code@latest pnpm@9.15.0 ||
              echo 'WARN: claude/pnpm update failed; using image-baked versions') &&
             ([ -s /home/node/.claude/settings.json ] || echo '{}' > /home/node/.claude/settings.json) &&
             (jq '.permissions.defaultMode = \"bypassPermissions\"' /home/node/.claude/settings.json > /tmp/cs.json &&
              mv /tmp/cs.json /home/node/.claude/settings.json ||
              echo 'WARN: could not set bypassPermissions default') &&
             exec sleep infinity"

volumes:
  claude-config:
  bash-history:
