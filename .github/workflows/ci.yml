# test/lint/typecheck のみ。デプロイは Workers Builds（Cloudflare 側）が担う＝
# このリポの Actions に Cloudflare の secret は存在しない（docs/adr/0003-secrets-strategy.md）。
# main の ruleset はこのワークフローの job 名 `ci` を required check に指定する。
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # node24: host/sandbox/CI を統一。CLI は .ts をネイティブ実行（ADR-0005）。
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm -r run check
      - name: Build
        run: pnpm -r run build
      - name: Test
        run: pnpm -r run test
      # lint スクリプトが生えたらここに追加する（pnpm -r run lint）
